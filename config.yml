<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "git-gateway",
            repo: "dumjeeckham-oss/dong100-home",
            branch: "main",
            auth_endpoint: "api/github-proxy"
          },
          // 나머지 컬렉션 설정 등...
        }
      });
    </script>
  </body>
</html>
