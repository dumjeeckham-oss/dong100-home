<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Use a clip path to restrict viewing to the left 100x100 area -->
  <defs>
    <clipPath id="squareLeft">
      <rect x="0" y="0" width="100" height="100" />
    </clipPath>
  </defs>
  <!-- Assuming the flower is on the far left, we scale the image so its height is 100 and let its width extend past the clip -->
  <image href="/logo.png" x="-5" y="0" height="100" clip-path="url(#squareLeft)" />
</svg>
